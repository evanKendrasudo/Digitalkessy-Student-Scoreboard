<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Kessy Studio Tools</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0008;
    --deep: #100014;
    --purple-dark: #1e0a2e;
    --purple-mid: #3d1460;
    --purple: #6b21a8;
    --purple-light: #9333ea;
    --purple-glow: #c084fc;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --white: #f5f0ff;
    --muted: #a89bb5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--black);
    font-family: 'Cinzel', serif;
    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 16px 60px;
  }
  .brand-header { text-align: center; margin-bottom: 24px; }
  .brand-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(12px, 3vw, 16px);
    letter-spacing: 0.25em;
    color: var(--purple-glow);
    text-transform: uppercase;
  }
  .brand-sub {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--muted);
    margin-top: 4px;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 24px;
    background: #130020;
    border: 1px solid #3d1460;
    border-radius: 12px;
    padding: 5px;
    width: 100%;
    max-width: 520px;
  }
  .tab-btn {
    background: transparent;
    border: none;
    border-radius: 8px;
    color: var(--muted);
    cursor: pointer;
    flex: 1;
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.2em;
    padding: 10px 6px;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .tab-btn.active {
    background: linear-gradient(135deg, #6b21a8, #9333ea);
    color: white;
    box-shadow: 0 2px 12px #9333ea40;
  }

  /* ── PANELS ── */
  .panel { display: none; width: 100%; max-width: 520px; }
  .panel.active { display: block; }

  /* ── SHARED EDITOR ── */
  .editor {
    background: linear-gradient(135deg, #130020 0%, #1a0030 100%);
    border: 1px solid #3d1460;
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 24px;
    box-shadow: 0 0 40px #6b21a820;
  }
  .editor-title {
    font-size: 11px;
    letter-spacing: 0.35em;
    color: var(--purple-glow);
    text-transform: uppercase;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .editor-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, #6b21a840, transparent);
  }
  .field-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }
  .field-group label { font-size: 10px; letter-spacing: 0.25em; color: var(--muted); text-transform: uppercase; }
  .field-group input, .field-group select, .field-group textarea {
    background: #0d0018;
    border: 1px solid #3d1460;
    border-radius: 8px;
    color: var(--white);
    font-family: 'Cinzel', serif;
    font-size: 13px;
    padding: 9px 13px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
  }
  .field-group textarea { font-family: 'Cormorant Garamond', serif; font-size: 14px; resize: vertical; min-height: 80px; line-height: 1.5; }
  .field-group input:focus, .field-group select:focus, .field-group textarea:focus {
    border-color: var(--purple-light);
    box-shadow: 0 0 12px #9333ea30;
  }
  .field-group select option { background: #130020; }
  .student-row { display: grid; grid-template-columns: 1fr 80px 36px; gap: 8px; align-items: center; margin-bottom: 10px; }
  .student-row input {
    background: #0d0018; border: 1px solid #3d1460; border-radius: 8px;
    color: var(--white); font-family: 'Cinzel', serif; font-size: 13px;
    padding: 8px 12px; outline: none; width: 100%; transition: border-color 0.2s;
  }
  .student-row input:focus { border-color: var(--purple-light); }
  .remove-btn {
    background: #2a0040; border: 1px solid #6b21a850; border-radius: 8px;
    color: #c084fc80; cursor: pointer; font-size: 18px; height: 36px; width: 36px;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .remove-btn:hover { background: #3d0060; color: #c084fc; border-color: #9333ea; }
  .add-btn {
    background: transparent; border: 1px dashed #6b21a870; border-radius: 8px;
    color: var(--purple-glow); cursor: pointer; font-family: 'Cinzel', serif;
    font-size: 11px; letter-spacing: 0.2em; padding: 9px; text-transform: uppercase;
    width: 100%; transition: all 0.2s; margin-bottom: 4px;
  }
  .add-btn:hover { background: #2a004030; border-color: #9333ea; }
  .generate-btn {
    background: linear-gradient(135deg, #6b21a8, #9333ea);
    border: none; border-radius: 10px; color: white; cursor: pointer;
    font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 0.3em;
    margin-top: 20px; padding: 14px; text-transform: uppercase; width: 100%;
    transition: all 0.25s; box-shadow: 0 4px 20px #9333ea40;
  }
  .generate-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 28px #9333ea60; }
  .generate-btn:active { transform: translateY(0); }

  /* ── DOWNLOAD BAR ── */
  .output-wrap { display: none; }
  .download-bar { display: flex; gap: 10px; margin-bottom: 16px; }
  .dl-btn {
    background: #130020; border: 1px solid #6b21a860; border-radius: 8px;
    color: var(--purple-glow); cursor: pointer; flex: 1; font-family: 'Cinzel', serif;
    font-size: 10px; letter-spacing: 0.2em; padding: 10px; text-align: center;
    text-transform: uppercase; transition: all 0.2s;
  }
  .dl-btn:hover { background: #2a0040; border-color: #9333ea; }

  /* ══════════════════════════════════════════
     SCOREBOARD
  ══════════════════════════════════════════ */
  #scoreboard {
    background: linear-gradient(160deg, #0e0018 0%, #1a0030 40%, #0e0018 100%);
    border: 1px solid #3d1460;
    border-radius: 20px;
    overflow: hidden;
    padding: 40px 28px 36px;
    position: relative;
    box-shadow: 0 0 60px #6b21a830, inset 0 0 80px #1e0a2e60;
  }
  #scoreboard::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%;
    transform: translateX(-50%);
    width: 300px; height: 200px;
    background: radial-gradient(ellipse, #6b21a840 0%, transparent 70%);
    pointer-events: none;
  }
  #scoreboard::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    opacity: 0.4; pointer-events: none; border-radius: 20px;
  }
  .sb-header { text-align: center; margin-bottom: 10px; }
  .sb-main-title { font-family: 'Cinzel', serif; font-size: clamp(26px, 7vw, 38px); font-weight: 400; color: var(--white); letter-spacing: 0.08em; line-height: 1; }
  .sb-script-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(28px, 8vw, 42px); font-style: italic; font-weight: 300; color: var(--gold-light); letter-spacing: 0.04em; line-height: 1.2; }
  .sb-divider { display: flex; align-items: center; justify-content: center; gap: 12px; margin: 14px 0 10px; }
  .sb-divider::before { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, transparent, #6b21a880); }
  .sb-divider::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to left, transparent, #6b21a880); }
  .sb-diamond { color: var(--purple-light); font-size: 10px; }
  .sb-sub { font-size: clamp(8px, 2vw, 11px); letter-spacing: 0.35em; color: var(--muted); text-align: center; text-transform: uppercase; margin-bottom: 28px; }
  .sb-entries { display: flex; flex-direction: column; gap: 10px; margin-bottom: 32px; }
  .sb-entry {
    background: linear-gradient(90deg, #1e0a2e80 0%, #13001e80 100%);
    border-left: 3px solid var(--purple-mid);
    border-radius: 10px;
    display: grid;
    grid-template-columns: 42px 1fr auto;
    align-items: center;
    padding: 14px 16px;
    position: relative;
  }
  .sb-entry.first { border-left-color: var(--gold); background: linear-gradient(90deg, #2a1a0050 0%, #1e0a2e80 100%); box-shadow: inset 0 0 30px #c9a84c0a; }
  .top-badge {
    position: absolute; right: 12px; top: -1px;
    background: linear-gradient(135deg, #c9a84c, #e8c97a);
    border-radius: 0 0 6px 6px; color: #0a0008; font-size: 7px; font-weight: 700;
    letter-spacing: 0.15em; padding: 3px 7px; text-transform: uppercase;
    display: flex; align-items: center; gap: 4px;
  }
  .sb-rank { color: var(--purple-glow); font-size: 11px; letter-spacing: 0.1em; opacity: 0.7; }
  .sb-name { font-family: 'Cormorant Garamond', serif; font-size: clamp(20px, 5vw, 26px); font-weight: 400; color: var(--white); }
  .sb-entry-type { font-size: 9px; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-top: 2px; }
  .sb-score { font-family: 'Cormorant Garamond', serif; font-size: clamp(28px, 7vw, 38px); font-weight: 300; color: var(--gold-light); line-height: 1; text-align: right; }
  .sb-entry.first .sb-score { color: var(--gold); }
  .sb-score sup { font-size: 0.38em; color: var(--muted); vertical-align: super; letter-spacing: 0.05em; }
  .sb-score-bar { grid-column: 1/-1; height: 2px; background: linear-gradient(to right, var(--purple-mid), transparent); border-radius: 2px; margin-top: 10px; }
  .sb-entry.first .sb-score-bar { background: linear-gradient(to right, #c9a84c60, transparent); }
  .sb-footer { text-align: center; padding-top: 16px; border-top: 1px solid #3d146040; }
  .sb-coached { font-size: 9px; letter-spacing: 0.3em; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
  .sb-brand { font-family: 'Cormorant Garamond', serif; font-size: clamp(16px, 4vw, 22px); font-style: italic; color: var(--purple-glow); }
  .sb-brand span { color: var(--purple-light); margin-left: 6px; font-style: normal; }

  /* ══════════════════════════════════════════
     CERTIFICATE
  ══════════════════════════════════════════ */
  #certificate {
    background: linear-gradient(160deg, #0e0018 0%, #180028 50%, #0e0018 100%);
    border-radius: 16px;
    padding: 28px 18px 28px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 60px #6b21a830;
    width: 100%;
    max-width: 520px;
    word-break: break-word;
  }
  /* corner borders */
  #certificate::before {
    content: '';
    position: absolute; inset: 10px;
    border: 1px solid #6b21a860;
    border-radius: 10px;
    pointer-events: none;
  }
  /* corner accents */
  .cert-corner {
    position: absolute;
    width: 28px; height: 28px;
    border-color: var(--purple-light);
    border-style: solid;
  }
  .cert-corner.tl { top: 6px; left: 6px; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
  .cert-corner.tr { top: 6px; right: 6px; border-width: 2px 2px 0 0; border-radius: 0 4px 0 0; }
  .cert-corner.bl { bottom: 6px; left: 6px; border-width: 0 0 2px 2px; border-radius: 0 0 0 4px; }
  .cert-corner.br { bottom: 6px; right: 6px; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }

  .cert-topbar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 18px;
  }
  .cert-topbar-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, #6b21a880); }
  .cert-topbar-line.r { background: linear-gradient(to left, transparent, #6b21a880); }
  .cert-topbar-text { font-size: 7px; letter-spacing: 0.2em; color: var(--purple-glow); text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
  .cert-topbar-diamond { color: var(--purple-light); font-size: 8px; }

  .cert-title-block { text-align: center; margin-bottom: 6px; }
  .cert-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(18px, 5vw, 26px);
    font-weight: 600;
    color: var(--white);
    letter-spacing: 0.05em;
  }
  .cert-course {
    font-size: clamp(8px, 2vw, 10px);
    letter-spacing: 0.4em;
    color: var(--purple-glow);
    text-transform: uppercase;
    margin-top: 5px;
  }

  .cert-divider {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; margin: 14px 0 12px;
  }
  .cert-divider::before, .cert-divider::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(to right, transparent, #6b21a870);
  }
  .cert-divider::after { background: linear-gradient(to left, transparent, #6b21a870); }
  .cert-divider-gem { color: var(--purple-light); font-size: 9px; }

  .cert-presented {
    font-size: clamp(8px, 2vw, 10px);
    letter-spacing: 0.35em;
    color: var(--muted);
    text-align: center;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .cert-student-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(26px, 8vw, 50px);
    font-style: italic;
    font-weight: 400;
    color: var(--purple-glow);
    text-align: center;
    line-height: 1.1;
    margin-bottom: 16px;
    overflow-wrap: break-word;
  }

  .cert-body {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(14px, 3.5vw, 17px);
    color: var(--muted);
    text-align: center;
    line-height: 1.7;
    margin-bottom: 20px;
    padding: 0 8px;
  }
  .cert-body strong {
    color: var(--white);
    font-weight: 600;
  }

  .cert-achievement-box {
    background: linear-gradient(135deg, #1e0a2e80, #13001e80);
    border: 1px solid #6b21a870;
    border-radius: 10px;
    padding: 14px 18px;
    text-align: center;
    margin-bottom: 28px;
  }
  .cert-achievement-text {
    font-size: clamp(7px, 1.8vw, 10px);
    letter-spacing: 0.2em;
    color: var(--gold-light);
    text-transform: uppercase;
    word-break: break-word;
  }
  .cert-achievement-star { color: var(--gold); margin: 0 6px; }

  .cert-sig-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 8px;
  }
  @media (max-width: 360px) {
    .cert-sig-row { grid-template-columns: 1fr; justify-items: center; gap: 14px; }
    .cert-seal { order: -1; }
  }

  .cert-sig {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .cert-sig-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(14px, 3.5vw, 22px);
    font-style: italic;
    color: var(--white);
    border-bottom: 1px solid #6b21a870;
    padding-bottom: 4px;
    width: 100%;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .cert-sig-label {
    font-size: 8px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    text-align: center;
  }

  .cert-seal {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 72px; height: 72px;
    border: 2px solid #6b21a8;
    border-radius: 50%;
    background: radial-gradient(ellipse, #2a0040, #0e0018);
    box-shadow: 0 0 20px #6b21a840;
    flex-shrink: 0;
  }
  .cert-seal-text {
    font-size: 7px;
    letter-spacing: 0.15em;
    color: var(--purple-glow);
    text-transform: uppercase;
    text-align: center;
    line-height: 1.4;
  }
  .cert-seal-year {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    color: var(--gold-light);
    font-weight: 600;
  }

  /* noise */
  #certificate .cert-noise {
    position: absolute; inset: 0; border-radius: 16px;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    opacity: 0.5; pointer-events: none;
  }
</style>
</head>
<body>

<div class="brand-header">
  <div class="brand-title">Digital Kessy Ghostwriting Studio</div>
  <div class="brand-sub">Student Graphics Generator</div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('scoreboard')">📊 Scoreboard</button>
  <button class="tab-btn" onclick="switchTab('certificate')">🏆 Certificate</button>
</div>

<!-- ════════ SCOREBOARD PANEL ════════ -->
<div class="panel active" id="panel-scoreboard">
  <div class="editor">
    <div class="editor-title">✦ Configure Scoreboard</div>
    <div class="field-group">
      <label>Subtitle / Round Label</label>
      <input type="text" id="sub-label" value="Chapter Review Results" placeholder="e.g. Chapter Review Results">
    </div>
    <div class="field-group">
      <label>Submission Type</label>
      <select id="submission-type">
        <option value="Chapter Submission">Chapter Submission</option>
        <option value="Assignment Submission">Assignment Submission</option>
        <option value="Week 1 Challenge">Week 1 Challenge</option>
        <option value="Week 2 Challenge">Week 2 Challenge</option>
        <option value="Final Submission">Final Submission</option>
        <option value="Custom">Custom...</option>
      </select>
    </div>
    <div class="field-group" id="custom-type-wrap" style="display:none">
      <label>Custom Submission Type</label>
      <input type="text" id="custom-type" placeholder="Type your label...">
    </div>
    <div class="editor-title" style="margin-top:20px;">✦ Students</div>
    <div id="students-list"></div>
    <button class="add-btn" onclick="addStudent()">+ Add Student</button>
    <button class="generate-btn" onclick="generateScoreboard()">Generate Scoreboard</button>
  </div>

  <div class="output-wrap" id="sb-output">
    <div class="download-bar">
      <button class="dl-btn" onclick="copyImg('scoreboard')">📋 Copy Image</button>
      <button class="dl-btn" onclick="downloadImg('scoreboard', 'digitalkessy-scoreboard.png')">⬇ Download PNG</button>
    </div>
    <div id="scoreboard">
      <div class="sb-header">
        <div class="sb-main-title">Student</div>
        <div class="sb-script-title">Scoreboard</div>
      </div>
      <div class="sb-divider"><span class="sb-diamond">♦</span></div>
      <div class="sb-sub" id="sb-sub-label">Chapter Review Results</div>
      <div class="sb-entries" id="sb-entries"></div>
      <div class="sb-footer">
        <div class="sb-coached">Coached by</div>
        <div class="sb-brand">Digital Kessy <span>🖤</span></div>
      </div>
    </div>
  </div>
</div>

<!-- ════════ CERTIFICATE PANEL ════════ -->
<div class="panel" id="panel-certificate">
  <div class="editor">
    <div class="editor-title">✦ Certificate Details</div>

    <div class="field-group">
      <label>Student Full Name</label>
      <input type="text" id="cert-name" placeholder="e.g. Rita Onwuka" value="">
    </div>

    <div class="field-group">
      <label>Course / Programme</label>
      <select id="cert-course">
        <option value="Ghostwriting Mastery">Ghostwriting Mastery</option>
        <option value="Dark Romance Writing">Dark Romance Writing</option>
        <option value="Platform Writing Bootcamp">Platform Writing Bootcamp</option>
        <option value="Custom">Custom...</option>
      </select>
    </div>
    <div class="field-group" id="cert-custom-course-wrap" style="display:none">
      <label>Custom Course Name</label>
      <input type="text" id="cert-custom-course" placeholder="Enter course name...">
    </div>

    <div class="field-group">
      <label>Achievement / Recognition</label>
      <select id="cert-achievement-select">
        <option value="First Platform Contract — GoodNovel">First Platform Contract — GoodNovel</option>
        <option value="First Platform Contract — Dreame">First Platform Contract
